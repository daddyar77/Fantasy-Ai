<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Uncensored AI · Chat</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            background: #0b0a12;
            color: #e5e7eb;
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            height: 100vh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }
        ::-webkit-scrollbar {
            width: 4px;
        }
        ::-webkit-scrollbar-track {
            background: #1a1625;
        }
        ::-webkit-scrollbar-thumb {
            background: #4c3b6e;
            border-radius: 8px;
        }

        .header {
            background: rgba(18, 16, 28, 0.95);
            padding: 10px 14px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid #3b2f54;
            flex-shrink: 0;
            backdrop-filter: blur(6px);
        }
        .header-info {
            display: flex;
            align-items: center;
            gap: 10px;
            min-width: 0;
        }
        .header-info .avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            object-fit: cover;
            border: 2px solid #a78bfa;
            flex-shrink: 0;
            transition: box-shadow 0.5s;
        }
        .header-info .avatar.glow {
            box-shadow: 0 0 20px #a78bfa;
        }
        .header-info .name-status {
            overflow: hidden;
        }
        .header-info .name-status h2 {
            font-size: 17px;
            font-weight: 700;
            background: linear-gradient(135deg, #f472b6, #a78bfa);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .header-info .name-status p {
            font-size: 11px;
            color: #a78bfa;
            display: flex;
            align-items: center;
            gap: 5px;
        }
        .online-dot {
            display: inline-block;
            width: 7px;
            height: 7px;
            background: #34d399;
            border-radius: 50%;
            animation: pulse 1.5s infinite;
            flex-shrink: 0;
        }
        @keyframes pulse {
            0%,
            100% {
                opacity: 1;
            }
            50% {
                opacity: 0.3;
            }
        }

        .header-actions {
            display: flex;
            gap: 6px;
            flex-shrink: 0;
        }
        .settings-btn {
            background: #2d2444;
            color: #c4b5fd;
            border: 1px solid #4c3b6e;
            padding: 6px 14px;
            border-radius: 30px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            touch-action: manipulation;
            white-space: nowrap;
        }
        .settings-btn:active {
            background: #4c3b6e;
        }

        .chat-window {
            flex: 1;
            overflow-y: auto;
            padding: 14px 12px 90px 12px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            background: radial-gradient(circle at 50% 0%, #16132a, #0b0a12 80%);
            transition: background 0.8s;
        }

        .msg-row {
            display: flex;
            align-items: flex-start;
            gap: 8px;
            max-width: 92%;
            animation: fadeIn 0.3s ease;
        }
        .msg-row.user {
            align-self: flex-end;
            flex-direction: row-reverse;
        }
        .msg-row.bot {
            align-self: flex-start;
        }
        @keyframes fadeIn {
            0% {
                opacity: 0;
                transform: translateY(10px);
            }
            100% {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .msg-avatar {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            object-fit: cover;
            border: 1.5px solid #4c3b6e;
            flex-shrink: 0;
            margin-top: 2px;
            background: #1a1625;
        }
        .msg-row.user .msg-avatar {
            border-color: #7c3aed;
        }
        .msg-row.bot .msg-avatar {
            border-color: #a78bfa;
        }

        .msg-content {
            display: flex;
            flex-direction: column;
            gap: 2px;
            max-width: 82%;
        }
        .msg-row.user .msg-content {
            align-items: flex-end;
        }
        .msg-row.bot .msg-content {
            align-items: flex-start;
        }

        .msg-sender {
            font-size: 10px;
            font-weight: 600;
            color: #a78bfa;
            padding: 0 4px;
            opacity: 0.8;
        }
        .msg-row.user .msg-sender {
            color: #c084fc;
        }

        .bubble {
            padding: 10px 14px;
            font-size: 15px;
            line-height: 1.6;
            border-radius: 18px;
            position: relative;
            word-wrap: break-word;
            box-shadow: 0 3px 10px rgba(0, 0, 0, 0.4);
            min-width: 30px;
        }
        .user-bubble {
            background: linear-gradient(135deg, #2b1f4a, #1e1435);
            border-bottom-right-radius: 4px;
            border: 1px solid #4c3b6e;
        }
        .bot-bubble {
            background: linear-gradient(135deg, #1e1b2e, #151225);
            border-bottom-left-radius: 4px;
            border: 1px solid #3b2f54;
        }
        .error-bubble {
            background: #4a1a2a;
            color: #ffa8b6;
            text-align: center;
            border: 1px solid #7f2d4a;
            border-radius: 10px;
        }
        .bubble img {
            max-width: 100%;
            border-radius: 12px;
            margin-top: 4px;
            cursor: pointer;
            border: 1px solid #5b4a7a;
            display: block;
        }
        .bubble-time {
            font-size: 10px;
            opacity: 0.4;
            display: block;
            text-align: right;
            margin-top: 4px;
            letter-spacing: 0.3px;
        }

        .msg-actions {
            display: none;
            gap: 6px;
            margin-top: 4px;
            justify-content: flex-end;
        }
        .msg-row:hover .msg-actions,
        .msg-row:active .msg-actions {
            display: flex;
        }
        .msg-actions button {
            background: #2d2444;
            border: none;
            color: #a78bfa;
            font-size: 11px;
            padding: 1px 8px;
            border-radius: 12px;
            border: 1px solid #3b2f54;
            cursor: pointer;
            touch-action: manipulation;
            line-height: 1.6;
        }
        .msg-actions button:active {
            background: #4c3b6e;
        }

        .typing-indicator {
            display: none;
            align-self: flex-start;
            background: #1e1b2e;
            padding: 8px 16px;
            border-radius: 30px;
            border: 1px solid #3b2f54;
            color: #a78bfa;
            font-size: 13px;
            gap: 6px;
            align-items: center;
            margin-top: 2px;
        }
        .typing-dot {
            width: 6px;
            height: 6px;
            background: #a78bfa;
            border-radius: 50%;
            animation: typingAnim 1.2s infinite;
        }
        .typing-dot:nth-child(2) {
            animation-delay: 0.2s;
        }
        .typing-dot:nth-child(3) {
            animation-delay: 0.4s;
        }
        @keyframes typingAnim {
            0%,
            60%,
            100% {
                transform: translateY(0);
            }
            30% {
                transform: translateY(-6px);
            }
        }

        .input-area {
            background: rgba(18, 16, 28, 0.96);
            padding: 8px 12px;
            display: flex;
            align-items: center;
            gap: 6px;
            position: fixed;
            bottom: 0;
            width: 100%;
            border-top: 1px solid #3b2f54;
            z-index: 10;
            backdrop-filter: blur(6px);
            flex-shrink: 0;
        }
        .input-field {
            flex: 1;
            background: #1e1a2e;
            color: white;
            border: 1px solid #3b2f54;
            padding: 10px 14px;
            border-radius: 30px;
            font-size: 15px;
            outline: none;
            min-width: 0;
            transition: border-color 0.3s;
        }
        .input-field:focus {
            border-color: #a78bfa;
        }
        .input-field:disabled {
            opacity: 0.5;
        }

        .send-btn,
        .pic-btn,
        .stop-btn {
            border: none;
            border-radius: 50%;
            width: 44px;
            height: 44px;
            font-size: 18px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            touch-action: manipulation;
            flex-shrink: 0;
            transition: transform 0.15s;
        }
        .send-btn:active,
        .pic-btn:active,
        .stop-btn:active {
            transform: scale(0.92);
        }
        .send-btn {
            background: #7c3aed;
            color: white;
        }
        .send-btn:active {
            background: #a78bfa;
        }
        .send-btn:disabled {
            opacity: 0.4;
            cursor: not-allowed;
        }

        .pic-btn {
            background: #2d2444;
            color: #a78bfa;
            border-radius: 30px;
            width: auto;
            padding: 0 14px;
            font-weight: 600;
            font-size: 12px;
            gap: 4px;
        }
        .pic-btn:active {
            background: #4c3b6e;
        }

        .stop-btn {
            background: #dc2626;
            color: white;
            display: none;
        }
        .stop-btn:active {
            background: #ef4444;
        }

        .modal {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.88);
            align-items: center;
            justify-content: center;
            z-index: 1000;
            padding: 14px;
            backdrop-filter: blur(4px);
        }
        .modal.show {
            display: flex !important;
        }
        .modal-content {
            background: #151225;
            border-radius: 24px;
            width: 100%;
            max-width: 480px;
            padding: 20px;
            border: 1px solid #4c3b6e;
            max-height: 92vh;
            overflow-y: auto;
            box-shadow: 0 0 50px rgba(76, 29, 149, 0.3);
        }
        .modal-header {
            font-size: 20px;
            font-weight: 700;
            text-align: center;
            padding-bottom: 12px;
            border-bottom: 1px solid #3b2f54;
            background: linear-gradient(135deg, #f472b6, #a78bfa);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .modal-sub {
            font-size: 12px;
            color: #8b7aa8;
            text-align: center;
            margin-top: -4px;
            margin-bottom: 12px;
        }

        .form-group {
            margin-bottom: 12px;
        }
        .form-group label {
            font-size: 12px;
            color: #a78bfa;
            font-weight: 700;
            display: block;
            margin-bottom: 3px;
        }
        .form-control {
            width: 100%;
            background: #1e1a2e;
            color: white;
            border: 1px solid #3b2f54;
            padding: 8px 12px;
            border-radius: 12px;
            font-size: 14px;
            outline: none;
            transition: border 0.2s;
        }
        .form-control:focus {
            border-color: #a78bfa;
        }
        .form-control select option {
            background: #1e1a2e;
        }
        .form-control::placeholder {
            color: #5b4a7a;
        }
        textarea.form-control {
            resize: vertical;
            min-height: 60px;
            font-family: inherit;
        }

        .badge-key {
            background: #f59e0b;
            color: #0e0c16;
            font-size: 9px;
            font-weight: 700;
            padding: 2px 8px;
            border-radius: 20px;
            margin-left: 6px;
        }
        .badge-free {
            background: #34d399;
            color: #0e0c16;
            font-size: 9px;
            font-weight: 800;
            padding: 2px 8px;
            border-radius: 20px;
            margin-left: 6px;
            text-transform: uppercase;
        }

        .modal-actions {
            display: flex;
            justify-content: space-between;
            margin-top: 16px;
            border-top: 1px solid #3b2f54;
            padding-top: 16px;
            gap: 8px;
            flex-wrap: wrap;
        }
        .btn {
            border: none;
            padding: 8px 16px;
            border-radius: 30px;
            cursor: pointer;
            font-size: 13px;
            font-weight: 700;
            touch-action: manipulation;
            transition: opacity 0.15s;
        }
        .btn:active {
            opacity: 0.7;
        }
        .btn-gray {
            background: #2d2444;
            color: #c4b5fd;
        }
        .btn-red {
            background: #7f1d1d;
            color: #fca5a5;
        }
        .btn-green {
            background: #7c3aed;
            color: white;
        }
        .btn-outline {
            background: transparent;
            color: #a78bfa;
            border: 1px solid #4c3b6e;
        }

        .helper-link {
            font-size: 11px;
            color: #8b7aa8;
            margin-top: 4px;
        }
        .helper-link a {
            color: #a78bfa;
            text-decoration: none;
        }
        .profile-section {
            background: #1a1625;
            border-radius: 14px;
            padding: 12px 14px;
            margin-bottom: 12px;
            border: 1px solid #2d2444;
        }
        .profile-section .section-title {
            font-size: 13px;
            font-weight: 700;
            color: #c084fc;
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .divider {
            border: none;
            border-top: 1px solid #2d2444;
            margin: 12px 0;
        }

        @media (max-width: 480px) {
            .header {
                padding: 8px 10px;
            }
            .header-info .avatar {
                width: 34px;
                height: 34px;
            }
            .header-info .name-status h2 {
                font-size: 15px;
            }
            .header-info .name-status p {
                font-size: 10px;
            }
            .settings-btn {
                font-size: 11px;
                padding: 4px 10px;
            }
            .chat-window {
                padding: 10px 8px 80px 8px;
                gap: 8px;
            }
            .msg-row {
                max-width: 96%;
                gap: 6px;
            }
            .msg-avatar {
                width: 28px;
                height: 28px;
            }
            .bubble {
                font-size: 14px;
                padding: 8px 12px;
            }
            .msg-content {
                max-width: 88%;
            }
            .input-area {
                padding: 6px 8px;
                gap: 4px;
            }
            .input-field {
                font-size: 14px;
                padding: 8px 12px;
            }
            .send-btn,
            .stop-btn {
                width: 40px;
                height: 40px;
                font-size: 16px;
            }
            .pic-btn {
                font-size: 11px;
                padding: 0 10px;
                height: 40px;
            }
            .modal-content {
                padding: 16px;
                max-height: 96vh;
            }
            .modal-header {
                font-size: 18px;
            }
        }
        @media (max-width: 380px) {
            .msg-avatar {
                width: 24px;
                height: 24px;
            }
            .bubble {
                font-size: 13px;
                padding: 6px 10px;
            }
        }
    </style>
</head>
<body>
    <div class="header">
        <div class="header-info">
            <img id="botAvatar" src="https://i.imgur.com/HeIi0wU.png" class="avatar" alt="bot">
            <div class="name-status">
                <h2 id="botName">Uncensored AI</h2>
                <p><span class="online-dot"></span> <span id="statusText">Online</span></p>
            </div>
        </div>
        <div class="header-actions">
            <button class="settings-btn" id="settingsBtn">⚙️</button>
        </div>
    </div>

    <div id="chatWindow" class="chat-window"></div>

    <div id="typingIndicator" class="typing-indicator">
        <span>soch raha hoon</span>
        <span class="typing-dot"></span>
        <span class="typing-dot"></span>
        <span class="typing-dot"></span>
    </div>

    <div class="input-area">
        <input type="text" id="userInput" class="input-field" placeholder="Roman Urdu / English mein likhiye…" autocomplete="off">
        <button class="pic-btn" id="picBtn">📷 Pic</button>
        <button class="stop-btn" id="stopBtn">⏹</button>
        <button class="send-btn" id="sendBtn">➤</button>
    </div>

    <div id="settingsModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">⚙️ Character &amp; Settings</div>
            <div class="modal-sub">Sab settings auto-save ho jaati hain</div>

            <div class="profile-section">
                <div class="section-title">🤖 Bot Profile</div>
                <div class="form-group">
                    <label>Bot Name:</label>
                    <input type="text" id="nameInput" class="form-control" placeholder="E.g., Aisha, Zayn">
                </div>
                <div class="form-group">
                    <label>Bot Avatar URL:</label>
                    <input type="text" id="botAvatarInput" class="form-control" placeholder="https://…">
                </div>
                <div class="form-group">
                    <label>🧠 Personality:</label>
                    <input type="text" id="personalityInput" class="form-control" placeholder="Witty, romantic, dark…">
                </div>
                <div class="form-group">
                    <label>🌍 Scenario:</label>
                    <input type="text" id="scenarioInput" class="form-control" placeholder="Fantasy, cyberpunk, modern…">
                </div>
                <div class="form-group">
                    <label>📝 Character Note:</label>
                    <textarea id="charNoteInput" rows="2" class="form-control" placeholder="Backstory, quirks, style…"></textarea>
                </div>
                <div class="form-group">
                    <label>💬 First Message (greeting):</label>
                    <textarea id="firstMsgInput" rows="2" class="form-control" placeholder="Hello! I'm your uncensored AI…"></textarea>
                </div>
            </div>

            <div class="profile-section">
                <div class="section-title">🧑 User Profile</div>
                <div class="form-group">
