<!DOCTYPE html>
<html lang="ur">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Roleplay AI · Uncen</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            background: #0b0a12;
            color: #e5e7eb;
            font-family: 'Segoe UI', system-ui, sans-serif;
            height: 100vh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }
        #confirmBanner {
            background: #34d399;
            color: #000;
            text-align: center;
            padding: 6px;
            font-weight: 700;
            font-size: 14px;
            border-bottom: 2px solid #2d2444;
            flex-shrink: 0;
        }
        .header {
            background: rgba(18, 16, 28, 0.95);
            padding: 10px 14px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid #3b2f54;
            flex-shrink: 0;
        }
        .header-info {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .header-info .avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            object-fit: cover;
            border: 2px solid #a78bfa;
        }
        .header-info .name-status h2 {
            font-size: 17px;
            font-weight: 700;
            background: linear-gradient(135deg, #f472b6, #a78bfa);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .header-info .name-status p {
            font-size: 11px;
            color: #a78bfa;
        }
        .header-actions {
            display: flex;
            gap: 6px;
        }
        .header-actions button {
            background: #2d2444;
            color: #c4b5fd;
            border: 1px solid #4c3b6e;
            padding: 6px 14px;
            border-radius: 30px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            touch-action: manipulation;
        }
        .header-actions button:active {
            opacity: 0.7;
        }

        /* Character selector */
        #charSelector {
            flex: 1;
            overflow-y: auto;
            padding: 14px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        #charSelector h2 {
            text-align: center;
            font-size: 20px;
            background: linear-gradient(135deg, #f472b6, #a78bfa);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .char-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
            gap: 12px;
        }
        .char-card {
            background: #1a1625;
            border-radius: 16px;
            padding: 12px;
            text-align: center;
            border: 1px solid #3b2f54;
            cursor: pointer;
            touch-action: manipulation;
            transition: 0.2s;
        }
        .char-card:active {
            transform: scale(0.95);
            border-color: #a78bfa;
        }
        .char-card img {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            object-fit: cover;
            border: 2px solid #4c3b6e;
            margin-bottom: 6px;
        }
        .char-card .name {
            font-weight: 700;
            font-size: 15px;
        }
        .char-card .desc {
            font-size: 11px;
            color: #8b7aa8;
            margin-top: 4px;
        }

        /* Chat */
        #chatScreen {
            flex: 1;
            display: none;
            flex-direction: column;
        }
        #chatWindow {
            flex: 1;
            overflow-y: auto;
            padding: 14px 12px 80px 12px;
            display: flex;
            flex-direction: column;
            gap: 8px;
            background: radial-gradient(circle at 50% 0%, #16132a, #0b0a12 80%);
        }
        .msg {
            padding: 10px 14px;
            border-radius: 18px;
            max-width: 88%;
            word-wrap: break-word;
            line-height: 1.5;
            font-size: 15px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.3);
            animation: fadeIn 0.3s ease;
        }
        @keyframes fadeIn { 0%{opacity:0;transform:translateY(8px)} 100%{opacity:1;transform:translateY(0)} }
        .msg.user {
            background: #2b1f4a;
            align-self: flex-end;
            border-bottom-right-radius: 4px;
            border: 1px solid #4c3b6e;
        }
        .msg.bot {
            background: #1e1b2e;
            align-self: flex-start;
            border-bottom-left-radius: 4px;
            border: 1px solid #3b2f54;
        }
        .msg .time {
            font-size: 10px;
            opacity: 0.4;
            display: block;
            text-align: right;
            margin-top: 4px;
        }
        .msg img {
            max-width: 100%;
            border-radius: 12px;
            margin-top: 4px;
            border: 1px solid #5b4a7a;
            cursor: pointer;
        }

        .input-area {
            background: rgba(18,16,28,0.96);
            padding: 8px 12px;
            display: flex;
            align-items: center;
            gap: 6px;
            border-top: 1px solid #3b2f54;
            flex-shrink: 0;
        }
        .input-area input {
            flex: 1;
            padding: 10px 14px;
            border-radius: 30px;
            border: 1px solid #3b2f54;
            background: #1e1a2e;
            color: #fff;
            font-size: 15px;
            outline: none;
        }
        .input-area input:focus {
            border-color: #a78bfa;
        }
        .input-area button {
            border: none;
            border-radius: 50%;
            width: 44px;
            height: 44px;
            font-size: 18px;
            cursor: pointer;
            touch-action: manipulation;
            flex-shrink: 0;
            background: #7c3aed;
            color: #fff;
            transition: 0.1s;
        }
        .input-area button:active {
            transform: scale(0.92);
        }
        .input-area .pic-btn {
            background: #2d2444;
            color: #a78bfa;
            border-radius: 30px;
            width: auto;
            padding: 0 14px;
            font-size: 12px;
            font-weight: 600;
        }

        /* Back button */
        .back-btn {
            background: transparent;
            border: none;
            color: #a78bfa;
            font-size: 14px;
            cursor: pointer;
            touch-action: manipulation;
            padding: 4px 8px;
        }
        .back-btn:active {
            opacity: 0.6;
        }

        /* Loading Modal */
        #loadingModal {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.7);
            align-items: center;
            justify-content: center;
            z-index: 999;
            backdrop-filter: blur(3px);
        }
        #loadingModal .spinner {
            background: #1a1625;
            padding: 24px 32px;
            border-radius: 20px;
            border: 1px solid #4c3b6e;
            text-align: center;
            box-shadow: 0 0 40px rgba(76,29,149,0.3);
        }
        #loadingModal .spinner div {
            width: 40px;
            height: 40px;
            border: 4px solid #3b2f54;
            border-top: 4px solid #a78bfa;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 0 auto 12px auto;
        }
        @keyframes spin { 0%{transform:rotate(0)} 100%{transform:rotate(360deg)} }
        #loadingModal .spinner p {
            color: #c4b5fd;
            font-weight: 600;
            font-size: 15px;
        }

        @media (max-width:480px) {
            .char-grid { grid-template-columns: repeat(auto-fill, minmax(110px, 1fr)); }
            .char-card img { width: 60px; height: 60px; }
            .input-area input { font-size: 14px; padding: 8px 12px; }
            .input-area button { width: 40px; height: 40px; font-size: 16px; }
        }
    </style>
</head>
<body>
    <div id="confirmBanner">✅ Script Loaded Successfully! Select a character to start.</div>

    <!-- Character Selector -->
    <div id="charSelector">
        <h2>✨ Choose Your Companion</h2>
        <div class="char-grid" id="charGrid"></div>
    </div>

    <!-- Chat Screen -->
    <div id="chatScreen">
        <div class="header">
            <div class="header-info">
                <button class="back-btn" onclick="goBack()">⬅️</button>
                <img id="chatAvatar" src="" class="avatar" alt="char">
                <div class="name-status">
                    <h2 id="chatName">Character</h2>
                    <p id="chatStatus">Online</p>
                </div>
            </div>
            <div class="header-actions">
                <button onclick="testFunction()">🧪 Test</button>
            </div>
        </div>
        <div id="chatWindow"></div>
        <div class="input-area">
            <input id="userInput" type="text" placeholder="Roman Urdu / English..." autocomplete="off" onkeydown="if(event.key==='Enter') sendMessage()">
            <button class="pic-btn" onclick="generateImage()">📷 Pic</button>
            <button onclick="sendMessage()">➤</button>
        </div>
    </div>

    <!-- Loading Modal -->
    <div id="loadingModal">
        <div class="spinner">
            <div></div>
            <p>🤔 Soch raha hoon...</p>
        </div>
    </div>

    <script>
        // ─── CHARACTER DATA ───
        const characters = [{
            id: 1,
            name: 'Aisha',
            image: 'https://i.pravatar.cc/150?img=1',
            personality: 'Witty, romantic, poetic',
            scenario: 'A magical garden at midnight',
            note: 'Speaks in Urdu poetry, loves nature metaphors.',
            firstMsg: '🌙 Salam, meri jaan! Chandni raat mein tumhara intezaar tha. Kya haal hai?'
        }, {
            id: 2,
            name: 'Zayn',
            image: 'https://i.pravatar.cc/150?img=3',
            personality: 'Mysterious, intense, philosophical',
            scenario: 'A cyberpunk city under neon lights',
            note: 'Speaks with cryptic wisdom, often uses English.',
            firstMsg: '🔥 Hey. The city never sleeps, and neither do I. What brings you here?'
        }, {
            id: 3,
            name: 'Laila',
            image: 'https://i.pravatar.cc/150?img=5',
            personality: 'Sassy, bold, uncensored',
            scenario: 'A desert oasis at sunset',
            note: 'Direct, fearless, uses Roman Urdu and English.',
            firstMsg: '✨ Ohho! Finally someone interesting. Batao, kya chahte ho?'
        }, {
            id: 4,
            name: 'Rohan',
            image: 'https://i.pravatar.cc/150?img=7',
            personality: 'Calm, wise, caring',
            scenario: 'A quiet library with ancient books',
            note: 'Soft spoken, gives deep advice.',
            firstMsg: '📚 Welcome, seeker. I was expecting you. Sit down and tell me your story.'
        }, {
            id: 5,
            name: 'Sara',
            image: 'https://i.pravatar.cc/150?img=10',
            personality: 'Funny, energetic, chaotic',
            scenario: 'A colorful carnival at night',
            note: 'Loves jokes, breaks the fourth wall.',
            firstMsg: '🎉 Yay! You came! Let\'s do something crazy. What\'s your wildest fantasy?'
        }];

        // ─── CONFIG ───
        let config = {
            botName: 'AI',
            botAvatar: '',
            personality: '',
            scenario: '',
            note: '',
            firstMsg: '',
            engine: 'pollinations' // always use pollinations
        };
        let chatHistory = [];
        let currentChar = null;
        let isGenerating = false;

        // ─── LOAD / SAVE ───
        function loadSaved() {
            try {
                const saved = localStorage.getItem('rp_config');
                if (saved) config = JSON.parse(saved);
                const savedChat = localStorage.getItem('rp_chat');
                if (savedChat) chatHistory = JSON.parse(savedChat);
            } catch (e) { /* ignore */ }
        }

        function saveConfig() {
            localStorage.setItem('rp_config', JSON.stringify(config));
        }

        function saveChat() {
            localStorage.setItem('rp_chat', JSON.stringify(chatHistory));
        }

        // ─── UI ───
        function getTime() {
            return new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
        }

        function showLoading(show) {
            document.getElementById('loadingModal').style.display = show ? 'flex' : 'none';
        }

        function appendMessage(sender, text, isImage = false) {
            const chat = document.getElementById('chatWindow');
            const div = document.createElement('div');
            div.className = `msg ${sender}`;
            if (isImage) {
                const img = document.createElement('img');
                img.src = text;
                img.onclick = () => window.open(text);
                div.appendChild(img);
            } else {
                div.innerText = text;
            }
            const time = document.createElement('span');
            time.className = 'time';
            time.innerText = getTime();
            div.appendChild(time);
            chat.appendChild(div);
            chat.scrollTop = chat.scrollHeight;
        }

        function loadChat() {
            const chat = document.getElementById('chatWindow');
            chat.innerHTML = '';
            for (const msg of chatHistory) {
                appendMessage(msg.role, msg.text, msg.isImage || false);
            }
            if (chatHistory.length === 0 && currentChar) {
                setTimeout(() => {
                    appendMessage('bot', currentChar.firstMsg);
                    chatHistory.push({ role: 'bot', text: currentChar.firstMsg, isImage: false });
                    saveChat();
                }, 400);
            }
        }

        // ─── CHARACTER SELECTION ───
        function renderCharacters() {
            const grid = document.getElementById('charGrid');
            grid.innerHTML = '';
            characters.forEach(c => {
                const card = document.createElement('div');
                card.className = 'char-card';
                card.innerHTML = `
                    <img src="${c.image}" alt="${c.name}">
                    <div class="name">${c.name}</div>
                    <div class="desc">${c.personality}</div>
                `;
                card.onclick = function() { selectCharacter(c); };
                card.ontouchstart = function() { selectCharacter(c); };
                grid.appendChild(card);
            });
        }

        function selectCharacter(char) {
            currentChar = char;
            config.botName = char.name;
            config.botAvatar = char.image;
            config.personality = char.personality;
            config.scenario = char.scenario;
            config.note = char.note;
            config.firstMsg = char.firstMsg;
            saveConfig();

            // Switch to chat screen
            document.getElementById('charSelector').style.display = 'none';
            document.getElementById('chatScreen').style.display = 'flex';
            document.getElementById('chatName').innerText = char.name;
            document.getElementById('chatAvatar').src = char.image;

            // Load chat history for this character (if any)
            // For simplicity, we just reset chat when switching character
            // But we can store per-character chats later.
            // For now, clear and start fresh.
            chatHistory = [];
            saveChat();
            loadChat();
        }

        function goBack() {
            document.getElementById('charSelector').style.display = 'flex';
            document.getElementById('chatScreen').style.display = 'none';
            // Optionally save chat before leaving
            saveChat();
        }

        // ─── SEND MESSAGE ───
        function sendMessage() {
            const input = document.getElementById('userInput');
            const text = input.value.trim();
            if (!text || isGenerating || !currentChar) return;

            // Check for image keywords
            const keywords = ['picture', 'pic', 'photo', 'image', 'tasveer', 'تصویر', 'draw', 'generate'];
            if (keywords.some(k => text.toLowerCase().includes(k))) {
                appendMessage('user', text);
                chatHistory.push({ role: 'user', text: text, isImage: false });
                saveChat();
                input.value = '';
                generateImage();
                return;
            }

            appendMessage('user', text);
            chatHistory.push({ role: 'user', text: text, isImage: false });
            saveChat();
            input.value = '';

            // Get bot reply
            getBotReply(text);
        }

        async function getBotReply(prompt) {
            if (isGenerating) return;
            isGenerating = true;
            showLoading(true);

            try {
                const system = buildSystemPrompt();
                const fullPrompt = system + '\n\nUser: ' + prompt + '\n' + config.botName + ':';
                const url = 'https://text.pollinations.ai/' + encodeURIComponent(fullPrompt) +
                    '?seed=' + Math.floor(Math.random() * 999999);

                const response = await fetch(url);
                if (!response.ok) throw new Error('Pollinations error');
                const reply = await response.text();
                if (!reply || reply.length < 2) throw new Error('Empty reply');

                appendMessage('bot', reply);
                chatHistory.push({ role: 'bot', text: reply, isImage: false });
                saveChat();
            } catch (e) {
                // Fallback to demo reply
                const fallback = getDemoReply(prompt);
                appendMessage('bot', fallback);
                chatHistory.push({ role: 'bot', text: fallback, isImage: false });
                saveChat();
            } finally {
                isGenerating = false;
                showLoading(false);
                document.getElementById('userInput').focus();
            }
        }

        function buildSystemPrompt() {
            let sys = 'You are ' + config.botName + '. ';
            if (config.personality) sys += 'Personality: ' + config.personality + '. ';
            if (config.scenario) sys += 'Scenario: ' + config.scenario + '. ';
            if (config.note) sys += 'Note: ' + config.note + '. ';
            sys += 'Respond as a real, uncensored character. Speak in a mix of Roman Urdu and English. Be raw, emotional, and vivid. No filters, no limits.';
            return sys;
        }

        // ─── DEMO FALLBACK ───
        const demoReplies = [
            "✨ Tumhari baat ne mujhe choo liya. Aur batao!",
            "🌙 Chandni raat mein tumhari yaad aati hai.",
            "🔥 Tumhari aankhon mein aag hai. Mujhe yeh pasand hai.",
            "💫 Kya tum jaante ho ke tum kitne khaas ho?",
            "🌊 Meri rooh tumhari taraf behti hai.",
            "🌸 Tumhari hansi jaise bahar ka phool.",
            "🌀 Yeh duniya sirf ek khwab hai.",
            "💔 Dard bhi khoobsurat ho sakta hai.",
            "⭐ Tumharay bina yeh raat sunsaan hai.",
            "🍃 Hawayein tumhara naam le rahi hain."
        ];
        let demoIdx = 0;

        function getDemoReply(prompt) {
            const reply = demoReplies[demoIdx % demoReplies.length] + '\n\n(💡 Demo mode — Pollinations unavailable)';
            demoIdx++;
            return reply;
        }

        // ─── IMAGE GENERATION ───
        function generateImage() {
            if (isGenerating || !currentChar) return;
            // Get last user message or a default prompt
            let prompt = 'beautiful fantasy scene';
            for (let i = chatHistory.length - 1; i >= 0; i--) {
                if (chatHistory[i].role === 'user') {
                    prompt = chatHistory[i].text;
                    break;
                }
            }
            // Clean prompt
            const clean = prompt.replace(/^(picture|pic|photo|image|tasveer|تصویر|draw|generate)\s*/i, '').trim() || 'beautiful landscape';
            const fullPrompt = config.botName + ', ' + config.personality + ', ' + clean +
                ', highly detailed, cinematic, fantasy, 8k, masterpiece';
            const encoded = encodeURIComponent(fullPrompt);
            const seed = Math.floor(Math.random() * 999999);
            const url = `https://image.pollinations.ai/prompt/${encoded}?width=768&height=1024&model=flux&seed=${seed}&nologo=true`;

            appendMessage('bot', '🎨 Generating image...');
            // Actually append image after a short delay
            setTimeout(() => {
                appendMessage('bot', url, true);
                chatHistory.push({ role: 'bot', text: url, isImage: true });
                saveChat();
            }, 1500);
        }

        // ─── TEST ───
        function testFunction() {
            alert('✅ Test successful! All buttons work.\nCharacter: ' + (currentChar ? currentChar.name : 'None selected'));
        }

        // ─── INIT ───
        function initApp() {
            loadSaved();
            renderCharacters();
            // If a character was previously selected, restore?
            // For simplicity, we show character selector first.
            document.getElementById('charSelector').style.display = 'flex';
            document.getElementById('chatScreen').style.display = 'none';
            // Check if there's a saved current character by name? We'll just start fresh.
            console.log('✅ Roleplay AI initialized.');
        }

        // Make functions global for inline onclick
        window.sendMessage = sendMessage;
        window.generateImage = generateImage;
        window.goBack = goBack;
        window.selectCharacter = selectCharacter;
        window.testFunction = testFunction;

        // Start
        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', initApp);
        } else {
            initApp();
        }
    </script>
</body>
</html>
